[project]
name = "flepimop2-ipynbrender"
version = "0.1.0"
description = "External provider for `flepimop2` to render ipynb files."
readme = "README.md"
authors = [
    { name = "Timothy Willard", email = "twillard@unc.edu" }
]
requires-python = ">=3.12"
dependencies = [
    "flepimop2",
    "jupyter>=1.1.1",
    "nbformat>=5.10.4",
    "pydantic>=2.12.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/flepimop2"]

[tool.uv.sources]
flepimop2 = { git = "https://github.com/ACCIDDA/flepimop2", branch = "main" }

[dependency-groups]
dev = [
    "mypy>=1.18.2",
    "pytest>=9.0.1",
    "ruff>=0.14.5",
]

[tool.pytest.ini_options]
testpaths = [
    "src/flepimop2/",
    "tests/",
]

[tool.ruff.format]
docstring-code-format = true
docstring-code-line-length = 72

[tool.ruff.lint]
select = [
    "ALL",
]
ignore = [
    "COM812",   # Missing trailing comma, not needed when used with the formatter
    "CPY001",   # Missing copyright notice at top of file
    "D203",     # 1 blank line required before class docstring
    "D212",     # Multi-line docstring summary should start at the first line
    "PLR2004",  # Consider replacing magic number with a constant variable
]

[tool.mypy]
namespace_packages = true
mypy_path = ["src"]
explicit_package_bases = true

[tool.ruff.lint.flake8-annotations]
allow-star-arg-any = true

[tool.ruff.lint.per-file-ignores]
"tests/**/*" = [
    "INP001",   # Implicit namespace package
    "PLC2701",  # Private name import from external module
    "PLR6301",  # Method could be a function, class method, or static method
    "S101",     # Use of `assert` detected
    "SLF001",   # Private member accessed
]
"**/*.ipynb" = [
    "T201",     # `print` found
]

[tool.ruff.lint.pydocstyle]
convention = "google"
