[project]
name = "flepimop2-extras"
# Managed by `just sync-versions`; the source of truth is
# [tool.flepimop2-extras].version below. Do not edit by hand.
version = "0.3.0dev"
description = "Common external provider modules for flepimop2"
readme = "README.md"
license = "GPL-3.0-or-later"
authors = [
    { name = "Carl Pearson", email = "cap1024@unc.edu" },
    { name = "Joshua Macdonald", email = "jmacdo16@jh.edu" },
    { name = "Timothy Willard", email = "twillard@unc.edu" },
]
requires-python = ">=3.11,<3.15"
# This is a metapackage: it ships no code of its own, only optional dependencies
# that pull in the individual provider packages under `packages/`. Installing it
# bare gets nothing; select packages via the extras below.
dependencies = []
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Science/Research",
    "Operating System :: OS Independent",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Scientific/Engineering",
]

# Optional dependencies select which provider packages to install, e.g.
# `pip install 'flepimop2-extras[slurm]'` or `pip install 'flepimop2-extras[all]'`.
# Keep `all` in sync with the union of the individual extras as packages are added.
[project.optional-dependencies]
slurm = ["flepimop2-slurm"]
all = ["flepimop2-slurm"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# Single source of truth for values shared across every package in the
# workspace. `just sync-versions` writes these into the root `[project].version`
# and into each package's `[project].version` / flepimop2 dependency, and
# `just check-versions` fails CI if any package has drifted.
[tool.flepimop2-extras]
version = "0.3.0dev"
flepimop2-constraint = "flepimop2>=0.2.0,<1.0.0"

# The metapackage has no modules of its own, so build a code-less wheel.
[tool.hatch.build.targets.wheel]
bypass-selection = true

[tool.uv.workspace]
members = ["packages/*"]

# Resolve the provider packages from the workspace during local development. uv
# strips `tool.uv.sources` from built artifacts, so the published metapackage
# depends on the packages from PyPI rather than these local paths.
[tool.uv.sources]
flepimop2-slurm = { workspace = true }

[dependency-groups]
dev = [
    "build>=1.4.2",
    "mypy>=1.18.2",
    "pytest>=8.4.2",
    "pytest-cov>=7.0.0",
    "ruff>=0.13.3",
    "twine>=6.2.0",
    "yamllint>=1.37.1",
    # Member packages, so a single `uv sync` installs the whole workspace.
    "flepimop2-slurm",
]

[tool.pytest.ini_options]
testpaths = [
    "packages",
]
addopts = [
    "--import-mode=importlib",
    "--doctest-modules",
]

[tool.ruff.format]
preview = true
docstring-code-format = true
docstring-code-line-length = 72

[tool.ruff.lint]
preview = true
select = [
    "ALL",
]
ignore = [
    "COM812",   # Missing trailing comma, not needed when used with the formatter
    "D203",     # 1 blank line required before class docstring
    "D212",     # Multi-line docstring summary should start at the first line
    "INP001",   # Implicit namespace package
    "RUF067",   # Non-trivial `__init__.py` file detected
]

[tool.ruff.lint.flake8-annotations]
allow-star-arg-any = true

[tool.ruff.lint.per-file-ignores]
"**/tests/**/*" = [
    "PLR6301",  # Method could be a function, class method, or static method
    "S101",     # Use of `assert` detected
    "SLF001",   # Private member accessed
]
"scripts/**/*" = [
    "T201",     # Use of `print` detected
]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.mypy]
mypy_path = ["packages/flepimop2-slurm/src"]
files = "."
exclude = [
    "^build/",
    "^dist/",
]
namespace_packages = true
explicit_package_bases = true
strict = true

[tool.coverage.report]
fail_under = 80
precision = 1
